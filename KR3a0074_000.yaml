body:
  text: 治世龜鑑儒家類提要臣等謹案治世龜鑑一卷元蘇天爵撰天爵有名臣事略别著録此書篇首結銜題中奉大夫江浙等處行中書省參知政事考元史天爵本𫝊凡兩拜是官一在至正七年一在至正十二年此書前有林興祖趙方二序皆標至正十二年壬辰正月則作於再任之日是時妖冦自淮右延及江東詔天爵總兵饒信克復一路六縣正干戈俶擾之際此書所採皆宋以前善政嘉言而大㫖歸於培養元氣其目凡六一曰治體一曰用人一曰守令一曰愛民一曰為政而終之以止盜殆有深意也天爵著述載於本𫝊者名臣事略十五卷文類七十卷松㕔章疏五卷春風亭筆記二卷詩七卷文三十卷又載有遼金紀元黃河源委二書未及脫稿而不載此書此本為成化丙午吳江知縣太和陳堯弼所刋其時去至正壬辰才百餘年舊本流𫝊當有所據本𫝊蓋偶遺之此亦足證元史之疏略也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀治世龜鑑原序治世龜鑑中奉大夫江浙等處行中書省參知政事趙郡蘇公所編也大綱凡六曰治體曰用人曰守令曰愛民曰為政曰止盜綱各有其目誠前知之龜不逺之鑒有志於治者宜無一之可遺吾姑於六綱之目各舉其一以例其餘治體之目九司馬公論牛僧孺而謂之誣今之論治體者必不至如牛僧孺之誣用人之目十有四歐陽公之論馮道謂其無亷恥司馬公以道為奸臣之尤今之用人者必不至用如是之人守令之目有六曰始造簿書備遺忘耳今反求精於案牘而忽於人才此張九齡歸重於守令者為守為令不可不此之思愛民之目六有謂弛茶鹽之禁非所當先此范文正公之言也掌大計者其可不思其所當先為政之目十有一而漢建武之詔所謂省減吏員者豈非當今為政之要歟而其止盜之目八舉夫子之言曰茍子之不欲雖賞之不竊又豈非人之至簡而易行者歟豫於龜鑒綱目非有所去取焉蓋各舉其一而其餘無非可為龜鑑者也蘇公著述之行於世者有名臣事略有文類於伊洛淵源録有序皆嘗得而讀之其明體適用之學實得之魯齊先生許文正公云至正十二年壬辰之嵗良月吉日三山林興祖謹書昔者先王盛時紀綱法度悉備子孫得有據依以為治號曰成憲舊章而君臣上下相與監觀前代以保天命繫民心者憂勤惕厲不敢少忘以為家法其制於未亂者如是故雖或孽芽其間而圖難於易為大於細可以無患夫豈有一旦土崩之禍哉秦人學不師古取凡三代聖人所以維持天下之具與其深微之意悉蕩滅掃除之蓋不特燔經書殺學士為足以亡其國家也自是以還創業者無所因襲守成者無所持循而廟堂之籌䇿侍從之論思遂為治亂安危之本其不可忽也明矣然歷代簡䇿所存忠言嘉謨曷可勝紀當其時或見用或用之而未究或遂不用得失具可考知而自今觀之則其所善皆可以勸而所戒者無不可懲也若夫上下古今博觀約取以貽當世而示來哲庶幾聖賢經世之志一二有見則誠哉君子之用心已乎江浙行省參政趙郡蘇公嘗采經史百氏書切於治道政要者輯為一編曰治世龜鑒至簡而不遺甚深而非激疏通練逹而正大之規著親切確實而公平之體存信為謀王斷國者之元龜寶鑑也民有言所貴於中國者以有上世帝王以來千數百年之議論也漠然無所鏡考而徒肆其胸臆亦公之所為深憂者乎公為御史知無不言持憲節以洗寃澤物為己任參議政府屹然弗阿兩典大藩皆勤於庶事尤拳拳焉以護惜國家元氣為心嘗奉詔宣撫京畿實冠諸道旁求民瘼秋毫無隱而酌理道之中正存大體於幾微不迎合於前無顧慮於後雖用事者若不見察而退居之日凡可以尊主庇民者未嘗少輟其討論之工也蓋公學本先王而志存天下其見於行事者如此則是書之作豈欲託諸空言者哉至正壬辰嵗正月初吉諸生新安趙方謹書
